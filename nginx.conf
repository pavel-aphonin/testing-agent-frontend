server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any path that doesn't match a real file falls back to index.html
    # so React Router can handle the route on the client.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite filenames are content-hashed)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any path that doesn't match a real file falls back to
    # index.html so React Router can handle the route on the client.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ``index.html`` MUST never be cached by the browser. Without this
    # Safari (and Chrome to a lesser extent) holds onto the previous
    # entry document, and since /assets/* is immutable for a year the
    # bundle reference inside that stale html keeps resolving to the
    # OLD content-hashed bundle — users see the previous version of the
    # SPA until they hard-refresh, which they don't know to do.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Cache static assets aggressively (Vite filenames are content-hashed
    # so any change produces a new file path → safe to cache forever).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Product mark: rounded red square + bold white "М" (Cyrillic). Mirrors
       the front face of the MarkovLogo component; kept simple (no back-face
       flip) because favicons are shown at 16-32px where the flip is invisible. -->
  <rect width="64" height="64" rx="14" fill="#EE3424"/>
  <text
    x="50%" y="50%"
    dominant-baseline="central" text-anchor="middle"
    font-family="-apple-system, Helvetica, Arial, sans-serif"
    font-weight="800" font-size="40" fill="#fff"
  >М</text>
</svg>
